<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — DhobiDesk</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar">
  <a class="navbar-brand" href="index.html">
    <div class="logo-icon">🧺</div>
    <span>DhobiDesk</span>
  </a>
  <ul class="navbar-links">
    <li><a href="schedule.html">Schedule</a></li>
    <li><a href="login.html">Login</a></li>
  </ul>
</nav>

<!-- ── Signup Form ── -->
<div class="main-wrapper">
  <div class="form-container">
    <div class="form-card fade-in-up">

      <div class="form-logo">
        <div class="logo-circle">🧺</div>
        <h2>Create Account</h2>
        <p class="form-subtitle">Join DhobiDesk to track your laundry</p>
      </div>

      <!-- Alert area -->
      <div id="alertBox" style="display:none;"></div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@hostel.edu" autocomplete="email" />
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" />
      </div>

      <!-- Role -->
      <div class="form-group">
        <label>Select Your Role</label>
        <div class="role-selector">
          <div class="role-option">
            <input type="radio" id="roleStudent" name="role" value="student" checked />
            <label for="roleStudent">
              <span class="role-icon">🎓</span>
              <span class="role-name">Student</span>
              <span>Submit & track laundry</span>
            </label>
          </div>
          <div class="role-option">
            <input type="radio" id="roleWorker" name="role" value="worker" />
            <label for="roleWorker">
              <span class="role-icon">👷</span>
              <span class="role-name">Worker</span>
              <span>Manage all laundry</span>
            </label>
          </div>
        </div>
      </div>

      <button class="btn btn-primary form-submit" id="signupBtn" onclick="handleSignup()">
        Create Account
      </button>

      <div class="form-footer">
        Already have an account? <a href="login.html">Login here</a>
      </div>

    </div>
  </div>
</div>

<!-- ── Footer ── -->
<footer class="footer">
  <p>© 2024 <strong>DhobiDesk</strong> — Smart Laundry Coordination for Hostels</p>
</footer>

<script type="module">
  import { signup, auth, onAuthStateChanged, checkUserRole } from './firebase.js';

  // If already logged in, redirect
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const role = await checkUserRole(user.uid);
      window.location.href = role === 'worker' ? 'worker.html' : 'student.html';
    }
  });

  function showAlert(message, type = 'error') {
    const box = document.getElementById('alertBox');
    const icons = { error: '❌', success: '✅', warning: '⚠️', info: 'ℹ️' };
    box.className = `alert alert-${type}`;
    box.innerHTML = `${icons[type]} ${message}`;
    box.style.display = 'flex';
  }

  window.handleSignup = async function () {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const role     = document.querySelector('input[name="role"]:checked').value;
    const btn      = document.getElementById('signupBtn');

    // Basic validation
    if (!email || !password) {
      showAlert('Please fill in all fields.', 'error'); return;
    }
    if (password.length < 6) {
      showAlert('Password must be at least 6 characters.', 'error'); return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account…';

    try {
      await signup(email, password, role);
      showAlert('Account created! Redirecting…', 'success');
      setTimeout(() => {
        window.location.href = role === 'worker' ? 'worker.html' : 'student.html';
      }, 1200);
    } catch (err) {
      let msg = 'Signup failed. Please try again.';
      if (err.code === 'auth/email-already-in-use') msg = 'This email is already registered. Try logging in.';
      if (err.code === 'auth/invalid-email')        msg = 'Invalid email address.';
      showAlert(msg, 'error');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  };
</script>

</body>
</html>
